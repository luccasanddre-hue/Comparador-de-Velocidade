<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Comparador de Velocidade</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🚗 Comparador de Velocidade</h1>

        <input
            type="text"
            id="veiculo1"
            placeholder="Nome do primeiro veículo"
        >

        <input
            type="number"
            id="velocidade1"
            placeholder="Velocidade do primeiro veículo"
        >

        <input
            type="text"
            id="veiculo2"
            placeholder="Nome do segundo veículo"
        >

        <input
            type="number"
            id="velocidade2"
            placeholder="Velocidade do segundo veículo"
        >

        <button id="comparar">
            Comparar
        </button>

        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
